# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

title: Xingtai Gui
description: >- # this means to ignore newlines until "baseurl:"
  Personal blog of Xingtai Gui.
baseurl: "" # the subpath of the site
url: "https://tabguigui.github.io" # the base hostname & protocol for the site
og_image: /assets/img/profile-pic.jpg
google_analytics: "UA-121636368-3"

header:
  pages:
    - name: Home
      slug: /

footer:
  show_powered_by: true
  contact:
    - name: Email
      value: tabgui324@gmail.com
      link: mailto:tabgui324@gmail.com
  follow:
    - name: GitHub
      link: http://github.com/TabGuigui


# Build settings
markdown: kramdown
sass:
    style: :compressed
plugins:
  - jekyll-feed

# Excluded items
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - feed.xml
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

# Used for defeating caching
version: 1
